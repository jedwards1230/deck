# Claude PR review — calls the shared reusable workflow in
# jedwards1230/release-workflows, which runs claude-code-action@v1 in Haiku
# PR-review mode with the public jedwards1230-plugins marketplace + review-team
# plugin enabled by default. The focus below is appended to the base prompt.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@v1
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      extra_plugins: |
        plugin-dev@claude-plugins-official
      extra_plugin_marketplaces: |
        https://github.com/anthropics/claude-plugins-official.git
      focus: |
        deck is a single-binary Go TUI (Bubbletea v2) slide presenter.
        - Go correctness: error handling, nil derefs, unchecked type assertions,
          goroutine + fsnotify watcher lifecycle/leaks on hot reload.
        - Bubbletea model Update correctness; message handling.
        - No CGO (must stay cross-compilable); version via ldflags, not hardcoded.
        - Code-block execution feature: command injection / unsafe exec.
        - For plugin files (manifest, hooks, skills, agents, commands), use plugin-dev's plugin-validator / skill-reviewer agents.
        Do NOT re-flag gofmt/golangci-lint findings — CI owns those.
